<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <link rel="icon" href="icon-192.png" type="image/png">
    <title>Tabungan</title>
    <style>
        :root {
            --primary: #4CAF50;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --success: #2f855a;
            --danger: #c53030;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
        .container { background: var(--card); padding: 24px; border-radius: 14px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); width: 100%; max-width: 440px; margin-top: 20px; }
        h1 { text-align: center; margin-bottom: 16px; color: var(--primary); font-size: 22px; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; color: var(--text-light); }
        input, select { width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 15px; transition: 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(76,175,80,0.2); }
        
        .btn { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.2s; margin-top: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #43a047; }
        .btn-secondary { background: #edf2f7; color: #4a5568; }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-add { background: #3182ce; color: white; }
        .btn-add:hover { background: #2b6cb0; }

        .total-box { background: #f7fafc; padding: 14px; border-radius: 10px; text-align: center; margin: 16px 0; border: 1px dashed #cbd5e0; }
        .total-box span { font-size: 22px; font-weight: 700; color: var(--text); display: block; }
        .total-box small { font-size: 13px; color: var(--text-light); }

        .progress-container { width: 100%; height: 14px; background: #e2e8f0; border-radius: 7px; overflow: hidden; margin: 12px 0; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #4CAF50, #8BC34A); transition: width 0.4s ease; }
        #statusText { text-align: center; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        #remainingText { text-align: center; color: var(--text-light); font-size: 13px; }

        .history-section { margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 16px; }
        .history-list { max-height: 250px; overflow-y: auto; margin-top: 12px; border: 1px solid #edf2f7; border-radius: 8px; padding: 4px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f0f4f8; font-size: 14px; }
        .history-item:last-child { border-bottom: none; }
        .type-masuk { color: var(--success); font-weight: 600; }
        .type-keluar { color: var(--danger); font-weight: 600; }
        .del-btn { background: #fed7d7; color: var(--danger); border: none; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .del-btn:hover { background: #fc8181; color: white; }
        .empty-msg { text-align: center; color: var(--text-light); padding: 16px; font-size: 14px; }
        
        .note { margin-top: 16px; font-size: 11px; color: var(--text-light); text-align: center; line-height: 1.4; }
    </style>
</head>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('✅ PWA Service Worker aktif'))
        .catch(err => console.error('❌ Gagal register SW:', err));
    });
  }
</script>
<body>
    <div class="container">
        <h1>Tabungan</h1>
        
        <div class="input-group">
            <label for="goal">🎯 Target Tabungan (Rp)</label>
            <input type="number" id="goal" placeholder="Contoh: 5000000" min="0">
            <button id="saveGoalBtn" class="btn btn-secondary">💾 Simpan Target</button>
        </div>

        <div class="total-box">
            <small>Total Tabungan Saat Ini</small>
            <span id="totalDisplay">Rp 0</span>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="statusText">Tentukan target & mulai catat tabungan.</p>
        <p id="remainingText"></p>

        <div class="history-section">
            <label>📝 Tambah Transaksi</label>
            <div class="input-group">
                <input type="number" id="transAmount" placeholder="Jumlah (Rp)" min="1">
            </div>
            <div class="input-group" style="display:flex; gap:8px;">
                <select id="transType" style="flex:1;">
                    <option value="masuk">💚 Pemasukan</option>
                    <option value="keluar">🔴 Penarikan</option>
                </select>
                <input type="text" id="transNote" placeholder="Keterangan (opsional)" style="flex:2;">
            </div>
            <button id="addTransBtn" class="btn btn-add">➕ Tambah ke Riwayat</button>

            <div class="history-list" id="historyList">
                <div class="empty-msg">Belum ada transaksi.</div>
            </div>
        </div>

        <p class="note">🔒 Data tersimpan lokal di browser. Tidak perlu internet. Riwayat otomatis menghitung total tabungan Anda.</p>
    </div>

    <script>
        const goalInput = document.getElementById('goal');
        const saveGoalBtn = document.getElementById('saveGoalBtn');
        const totalDisplay = document.getElementById('totalDisplay');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const remainingText = document.getElementById('remainingText');
        const transAmount = document.getElementById('transAmount');
        const transType = document.getElementById('transType');
        const transNote = document.getElementById('transNote');
        const addTransBtn = document.getElementById('addTransBtn');
        const historyList = document.getElementById('historyList');

        const formatRupiah = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        const formatDate = (iso) => {
            const d = new Date(iso);
            return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }) + ' ' + d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
        };

        let transactions = [];
        let goal = 0;

        function loadData() {
            goal = parseFloat(localStorage.getItem('tabunganGoal')) || 0;
            transactions = JSON.parse(localStorage.getItem('tabunganTransactions')) || [];
            goalInput.value = goal || '';
            renderHistory();
            calculateTotal();
        }

        function calculateTotal() {
            const total = transactions.reduce((sum, t) => t.type === 'masuk' ? sum + t.amount : sum - t.amount, 0);
            const clamped = Math.max(0, total);
            totalDisplay.textContent = formatRupiah(clamped);
            updateProgress(clamped);
            return clamped;
        }

        function updateProgress(current) {
            if (goal <= 0) {
                statusText.textContent = 'Tentukan target terlebih dahulu.';
                statusText.style.color = '#718096';
                remainingText.textContent = '';
                progressBar.style.width = '0%';
                return;
            }
            const pct = Math.min((current / goal) * 100, 100);
            const remaining = Math.max(goal - current, 0);
            progressBar.style.width = pct + '%';
            statusText.textContent = `${pct.toFixed(1)}% tercapai`;
            statusText.style.color = current >= goal ? 'var(--success)' : 'var(--text)';
            remainingText.textContent = current >= goal ? '🎉 Target Tercapai!' : `Sisa: ${formatRupiah(remaining)}`;
        }

        function renderHistory() {
            historyList.innerHTML = '';
            if (transactions.length === 0) {
                historyList.innerHTML = '<div class="empty-msg">Belum ada transaksi.</div>';
                return;
            }
            // Tampilkan yang terbaru di atas
            [...transactions].reverse().forEach(t => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const isMasuk = t.type === 'masuk';
                div.innerHTML = `
                    <div>
                        <div style="font-weight:500;">${formatDate(t.date)}</div>
                        <div style="font-size:12px;color:#718096;">${t.note || '-'}</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="${isMasuk ? 'type-masuk' : 'type-keluar'}">${isMasuk ? '+' : '-'} ${formatRupiah(t.amount)}</div>
                        <button class="del-btn" onclick="deleteTransaction(${t.id})">Hapus</button>
                    </div>
                `;
                historyList.appendChild(div);
            });
        }

        saveGoalBtn.addEventListener('click', () => {
            const val = parseFloat(goalInput.value);
            if (isNaN(val) || val <= 0) return alert('Target harus lebih dari 0.');
            goal = val;
            localStorage.setItem('tabunganGoal', goal);
            calculateTotal();
            alert('✅ Target berhasil disimpan!');
        });

        addTransBtn.addEventListener('click', () => {
            const amount = parseFloat(transAmount.value);
            if (isNaN(amount) || amount <= 0) return alert('Jumlah harus lebih dari 0.');
            
            transactions.push({
                id: Date.now(),
                date: new Date().toISOString(),
                type: transType.value,
                amount: amount,
                note: transNote.value.trim()
            });
            localStorage.setItem('tabunganTransactions', JSON.stringify(transactions));
            
            transAmount.value = '';
            transNote.value = '';
            renderHistory();
            calculateTotal();
        });

        window.deleteTransaction = (id) => {
            if (!confirm('Hapus transaksi ini? Total tabungan akan dihitung ulang.')) return;
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('tabunganTransactions', JSON.stringify(transactions));
            renderHistory();
            calculateTotal();
        };

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
